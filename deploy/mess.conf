# /etc/nginx/snippets/mess.conf
# SSPL Kitchen / Mess at /mess on sunexstones.com.
# Mirrors the lab.conf pattern: frontend (built SPA via nginx) + backend (FastAPI uvicorn).
#
# After updating sunexstones.conf to include this snippet:
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# The containers bind 127.0.0.1 only — never publicly reachable.

# API: strips /mess before forwarding to backend uvicorn (container 3121)
location /mess/api/ {
    proxy_pass http://127.0.0.1:3121/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /mess/api;
    proxy_read_timeout 300s;
    client_max_body_size 25M;
}

# Frontend: strips /mess before forwarding to inner nginx (container 3120)
location /mess/ {
    proxy_pass http://127.0.0.1:3120/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /mess;
    proxy_read_timeout 300s;
}

# Bare /mess → /mess/
location = /mess { return 301 /mess/; }
