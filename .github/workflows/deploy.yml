name: Deploy to VPS

# Auto-deploy on every push to main (whoever pushes), plus a manual
# "Run workflow" button (workflow_dispatch) in the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never let two deploys run at once; queue them instead of clobbering.
concurrency:
  group: vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync source to VPS
        # Mirror the repo into the deploy dir. Excludes protect server-only files
        # that must never be overwritten or deleted: the prod env file, DB
        # backups, and the local .git. Add others here if the server keeps them.
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='backups' \
            --exclude='node_modules' \
            --exclude='__pycache__' \
            --exclude='.venv' \
            -e "ssh -i ~/.ssh/id_deploy -o IdentitiesOnly=yes" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/sunex_mess/"

      - name: Build & restart stack on VPS
        run: |
          ssh -i ~/.ssh/id_deploy -o IdentitiesOnly=yes \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'bash /opt/sunex_mess/deploy/vps-deploy.sh'
