# Inner nginx (inside the frontend container). The outer reverse proxy
# (host nginx) strips the /mess prefix before forwarding here, so we
# serve everything from /.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cache hashed Vite assets aggressively
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — let React Router handle unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Lightweight liveness probe
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
